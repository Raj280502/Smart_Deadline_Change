services:
  - type: web
    name: smart-deadline-change
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt && python -m playwright install --with-deps chromium
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GROQ_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: AUTH_SECRET
        generateValue: true
      - key: DATABASE_PATH
        value: storage/smart_deadline.db
      - key: FRONTEND_URL
        sync: false
